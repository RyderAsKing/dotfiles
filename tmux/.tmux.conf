# Prefix
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# Terminal + UX
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 150

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Status content
set -g status-left '#{?client_prefix,[PREFIX] ,}#{?pane_in_mode,[COPY] ,}'
set -g window-status-format '#I:#W#F'
set -g window-status-current-format '#[bold]#I:#W#F'

set -g status-right '#{?window_zoomed_flag,[ZOOM] ,}'
set -ag status-right '#{E:@catppuccin_status_application}'
set -agF status-right '#{E:@catppuccin_status_cpu}'
set -ag status-right '#{E:@catppuccin_status_session}'
set -ag status-right '#{E:@catppuccin_status_uptime}'

# -----------------------------
# Keybindings (custom layer)
# -----------------------------

# Window navigation
bind H previous-window
bind L next-window
bind ^A last-window

# Splits (Vim style)
unbind '"'
unbind %
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane navigation (Vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind c select-pane -t :.+

# Resize panes (repeatable)
bind -r , resize-pane -L 20
bind -r . resize-pane -R 20
bind -r - resize-pane -D 7
bind -r = resize-pane -U 7

# Rename
bind r command-prompt -I "#W" "rename-window '%%'"
bind % command-prompt -I "#S" "rename-session '%%'"

# Session manager (your request)
bind S choose-tree -Zs

# Misc useful
bind n new-window -c "#{pane_current_path}"
bind N new-session
bind & kill-window
bind z resize-pane -Z
bind x kill-pane
bind X swap-pane -D
bind w list-windows
bind '"' choose-window
bind : command-prompt
bind K send-keys "clear"\; send-keys "Enter"

# Sync panes toggle
bind * setw synchronize-panes

# Reload config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded"

# Copy mode (Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -----------------------------
# Plugins runtime
# -----------------------------
run ~/.tmux/plugins/tmux/catppuccin.tmux
run ~/.tmux/plugins/tpm/tpm
